<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Midvale 12th Ward · 미드베일 12와드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..600;1,8..60,400..500&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5EFE3; --paper-edge:#ECE4D2; --card:#FBF7EE;
  --ink:#1B1915; --ink-soft:#3D362D; --gold:#9B7230; --gold-soft:#C9A969;
  --crimson:#8A2E2E; --muted:#6E5F4E; --hairline:#D9CFB9;
}
*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;background:var(--paper);color:var(--ink);
  font-family:"Source Serif 4",Georgia,serif;font-size:17px;line-height:1.5;overflow-wrap:break-word;
}
body{
  background:
    radial-gradient(circle at 50% 0%,var(--paper-edge) 0%,transparent 38%),
    radial-gradient(circle at 50% 100%,var(--paper-edge) 0%,transparent 42%),
    var(--paper);
  min-height:100vh;
}
.ko{font-family:"Noto Serif KR","Source Serif 4",serif;}
.sheet{max-width:33rem;margin:0 auto;padding:0 1.3rem 4rem;text-align:center;}

.head{padding:2.6rem 0 0;}

/* temple photo frame */
.temple{margin:0 auto 1.8rem;max-width:30rem;}
.temple img{width:100%;height:auto;display:block;border-radius:10px;
  box-shadow:0 2px 14px rgba(0,0,0,.18);}
.temple .placeholder{width:100%;aspect-ratio:16/10;border-radius:10px;
  display:flex;align-items:center;justify-content:center;text-align:center;
  background:linear-gradient(160deg,#E7DCC4,#D9CDB0);color:var(--muted);
  font-family:"Fraunces",serif;font-style:italic;font-size:.95rem;
  border:1px solid var(--hairline);}
.temple .cap{font-family:"Fraunces",serif;font-size:.72rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);margin-top:.6rem;}

.head h1{font-family:"Fraunces",serif;font-variation-settings:"opsz" 144,"wght" 420;
  font-size:clamp(1.8rem,6vw,2.5rem);line-height:1.1;margin:0;}
.head h1 .ko{display:block;font-weight:500;font-size:.8em;margin-top:.3rem;}

.intro{font-family:"Fraunces",serif;font-size:1.15rem;color:var(--ink-soft);margin:1.8rem 0 .2rem;}
.intro .ko{display:block;font-size:.92rem;color:var(--muted);margin-top:.3rem;}

.flourish{color:var(--gold-soft);font-size:1rem;margin:1.4rem 0 .2rem;letter-spacing:.5em;}

/* weekly talks list goes here */
.talks{margin:2.4rem 0 0;}
.empty{font-style:italic;color:var(--muted);font-size:.95rem;margin-top:2rem;}
.empty .ko{display:block;font-size:.86rem;margin-top:.3rem;}
</style>
</head>
<body>
<div class="sheet">

<div class="head">
  <div class="temple">
    <!-- When a licensed photo is available, replace the placeholder div below with:
         <img src="seoul-temple.jpg" alt="Seoul Korea Temple"> -->
    <div class="placeholder">Seoul Korea Temple</div>
    <div class="cap">Seoul Korea Temple · 서울 성전</div>
  </div>

  <h1>Midvale 12th Ward<span class="ko">미드베일 12와드</span></h1>

  <p class="intro">Here are this week&rsquo;s talks.
    <span class="ko">이번 주 말씀입니다.</span></p>
  <div class="flourish">&#10022;</div>
</div>

<div class="talks">
  <!-- weekly speakers + translation links will be listed here -->
  <p class="empty">This week&rsquo;s talks will be posted soon.
    <span class="ko">이번 주 말씀이 곧 게시됩니다.</span></p>
</div>

</div>
</body>
</html>
