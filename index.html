<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Midvale 12th Ward · 미드베일 12와드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..600;1,8..60,400..500&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5EFE3; --paper-edge:#ECE4D2; --card:#FBF7EE;
  --ink:#1B1915; --ink-soft:#3D362D; --gold:#9B7230; --gold-soft:#C9A969;
  --crimson:#8A2E2E; --muted:#6E5F4E; --hairline:#D9CFB9;
}
*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;background:var(--paper);color:var(--ink);
  font-family:"Source Serif 4",Georgia,serif;font-size:17px;line-height:1.5;overflow-wrap:break-word;
}
body{
  background:
    radial-gradient(circle at 50% 0%,var(--paper-edge) 0%,transparent 38%),
    radial-gradient(circle at 50% 100%,var(--paper-edge) 0%,transparent 42%),
    var(--paper);
  min-height:100vh;
}
.ko{font-family:"Noto Serif KR","Source Serif 4",serif;}
.sheet{max-width:33rem;margin:0 auto;padding:0 1.3rem 4rem;text-align:center;}
.head{padding:3.6rem 0 0;}
.head .eyebrow{font-family:"Fraunces",serif;font-size:.7rem;letter-spacing:.26em;
  text-transform:uppercase;color:var(--gold);margin:0 0 .9rem;}
.head h1{font-family:"Fraunces",serif;font-variation-settings:"opsz" 144,"wght" 420;
  font-size:clamp(1.8rem,6vw,2.5rem);line-height:1.1;margin:0;}
.head h1 .ko{display:block;font-weight:500;font-size:.8em;margin-top:.3rem;}
.flourish{color:var(--gold-soft);font-size:1rem;margin:1.6rem 0 .2rem;letter-spacing:.5em;}
.placeholder{font-family:"Fraunces",serif;font-style:italic;color:var(--muted);
  font-size:1.05rem;margin:2.6rem auto;max-width:24rem;}
.placeholder .ko{font-style:normal;display:block;font-size:.92rem;margin-top:.4rem;}
footer{margin-top:3rem;color:var(--muted);font-size:.8rem;line-height:1.5;}
footer .ko{display:block;margin-top:.2rem;}
</style>
</head>
<body>
<div class="sheet">

<div class="head">
  <p class="eyebrow">The Church of Jesus Christ of Latter-day Saints</p>
  <h1>Midvale 12th Ward<span class="ko">미드베일 12와드</span></h1>
  <div class="flourish">&#10022;</div>
</div>

<p class="placeholder">This week&rsquo;s sacrament meeting program and translated talks will appear here.
  <span class="ko">이번 주 성찬식 순서와 번역된 말씀이 여기에 표시됩니다.</span></p>

<footer>
  The Church of Jesus Christ of Latter-day Saints
  <span class="ko">예수 그리스도 후기성도 교회</span>
</footer>

</div>
</body>
</html>
