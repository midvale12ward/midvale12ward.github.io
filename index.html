<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Midvale 12th Ward · 미드베일 12와드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400..600;1,8..60,400..500&family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F3EA; --ink:#1E1B16; --ink-soft:#46402F; --muted:#6E5F4E;
  --crimson:#8A2E2E; --gold:#9B7230; --hairline:#DED4BF;
}
*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;background:var(--paper);color:var(--ink);
  font-family:"Source Serif 4",Georgia,serif;font-size:18px;line-height:1.55;
}
.ko{font-family:"Noto Serif KR","Source Serif 4",serif;}
.sheet{max-width:34rem;margin:0 auto;padding:2.8rem 1.4rem 4rem;}

.hero{display:block;width:100%;height:auto;border-radius:9px;
  border:1px solid var(--hairline);box-shadow:0 2px 12px rgba(30,27,22,.12);
  margin:0 0 2rem;}

h1{font-size:1.7rem;line-height:1.2;margin:0 0 .15rem;text-align:center;}
h1 .ko{display:block;font-weight:500;font-size:.78em;color:var(--ink-soft);margin-top:.2rem;}
.intro{text-align:center;color:var(--ink-soft);font-size:1.05rem;margin:.9rem 0 1rem;}
.intro .ko{display:block;font-size:.9rem;color:var(--muted);margin-top:.2rem;}
.weektopic{text-align:center;font-style:italic;color:var(--ink);font-size:1.05rem;margin:0 0 2.2rem;}
.weektopic .ko{display:block;font-style:normal;font-size:.92rem;color:var(--ink-soft);margin-top:.25rem;}

/* one speaker per row */
.speaker{padding:1.25rem 0;border-top:1px solid var(--hairline);}
.speaker:last-child{border-bottom:1px solid var(--hairline);}
.speaker .who{font-size:1.2rem;font-weight:600;}
.speaker .topic{color:var(--muted);font-style:italic;font-size:.98rem;margin-top:.15rem;}
.speaker .topic .ko{font-style:normal;}
.speaker a.talk{display:inline-block;margin-top:.55rem;color:var(--crimson);
  text-decoration:none;font-weight:600;font-size:1rem;}
.speaker a.talk:hover{color:var(--gold);text-decoration:underline;}

.empty{text-align:center;font-style:italic;color:var(--muted);font-size:1rem;margin-top:2.5rem;}
.empty .ko{display:block;font-size:.88rem;margin-top:.3rem;}
</style>
</head>
<body>
<div class="sheet">

  <img class="hero" src="seoul-temple.png" alt="Seoul Korea Temple" loading="lazy">
  <h1>Midvale 12th Ward<span class="ko">미드베일 12와드</span></h1>
  <p class="intro">Here are this week&rsquo;s talks.
    <span class="ko">이번 주 말씀입니다.</span></p>

    </div>

  <p class="weektopic">&ldquo;What We Are Becoming Is More Important Than What We Are&rdquo;
    <span class="ko">&ldquo;우리가 어떤 사람이 되어 가고 있는지가 지금 어떤 사람인지보다 더 중요합니다&rdquo;</span></p>

  <div class="speaker">

  </div>

  </div>

</div>
</body>
</html>
